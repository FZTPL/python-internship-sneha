<!DOCTYPE html>
<html>
<head>
    <title>Unit Converter</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#ffd6e7;
            font-family:'Trebuchet MS', sans-serif;
        }

        .card{
            width:500px;
            background:#fff5f8;
            padding:40px;
            border-radius:25px;
            text-align:center;
            box-shadow:0 8px 25px rgba(255, 105, 180, 0.15);
        }

        h1{
            color:#d63384;
            font-size:2.5rem;
            margin-bottom:10px;
        }

        p{
            color:#b04d74;
            font-size:1.1rem;
            line-height:1.6;
        }

        .btn{
            margin-top:20px;
            padding:12px 28px;
            border:none;
            border-radius:30px;
            background:#ff85b3;
            color:white;
            font-size:1rem;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    background:#ff85b3;
    color:white;
    padding:15px 25px;
    border-radius:20px;
    font-size:1rem;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
}
    </style>
</head>

<body>

<div class="card">
    <h1>🎀 Unit Converter</h1>

    <p>
        Convert Length, Weight, and Temperature
        quickly and beautifully.
    </p>

    <div class="buttons">

    <a href="/length" class="btn">
        📏 Length Converter
    </a>

    <a href="/weight" class="btn">
        ⚖️ Weight Converter
    </a>

    <a href="/temp" class="btn">
        🌡️ Temperature Converter
    </a>

</div>
</div>

</body>
</html>
