<!DOCTYPE html>
<html>
<head>
    <title>Edit Article</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Edit Article</h1>

    <form method="POST">
        <label>Title</label>
        <input
            type="text"
            name="title"
            value="{{ article.title }}"
        >
        <br><br>

        <label>Content</label>

        <br>

        <textarea
            name="content"
            rows="10"
            cols="50"
        >{{ article.content }}</textarea>

        <br><br>

        <label>Date</label>

        <input
            type="date"
            name="date"
            value="{{ article.date }}"
        >

        <br><br>

        <button type="submit">
            Save Changes
        </button>

    </form>

    <br>

    <a href="/dashboard">Back to Dashboard</a>

</body>
</html>
